services:
  postgres:
    image: postgres:15
    container_name: redroom-db
    environment:
      - POSTGRES_USER=redroomuser
      - POSTGRES_PASSWORD=localpass
      - POSTGRES_DB=redroom-db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
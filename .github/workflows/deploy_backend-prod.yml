name: Deploy Red Room Backend

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - ".github/workflows/deploy_redroom-backend-prod.yml"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: red-room-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
        
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      ##################################################
      #              DOTNET EF MIGRATIONS
      ##################################################
          
      - name: Restore
        run: dotnet restore backend.csproj

      - name: Build
        run: dotnet build backend.csproj --configuration Release --no-restore

      - name: Install EF CLI
        run: dotnet tool install --global dotnet-ef

      - name: Add EF to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Run EF Migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_POSTGRES_CONNECTION_STRING }}
        run: |
          dotnet ef database update

      ##################################################
      #                  AZURE LOGIN
      ##################################################
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      ##################################################
      #           ACR BUILD & DEPLOY IMAGE
      ##################################################    

      - name: Build and Push Docker Image
        run: |
          az acr build --registry ${{ vars.AZURE_ACR_NAME }} --image $IMAGE_NAME:${{ github.sha }} --image $IMAGE_NAME:latest backend

      - name: Deploy Container App
        run: |
          az containerapp update --name ${{ vars.AZURE_BACKEND_CONTAINER_APP }} --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} --image ${{ vars.AZURE_ACR_NAME }}.azurecr.io/$IMAGE_NAME:&{{ github.sha }}
